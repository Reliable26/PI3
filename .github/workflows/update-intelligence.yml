name: Update Intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # 9 PM Eastern during standard time / 10 PM during daylight time

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build static site
        run: |
          rm -rf dist
          mkdir -p dist/data
          cp index.html app.js styles.css dist/
          node scripts/update-intelligence.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
