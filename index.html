<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div></div>
    <div class="actions">
      <button id="updateBtn">Update Intelligence</button>
      <button id="exportBtn">Export CSV</button>
    </div>
  </header>
  <main class="container">
    <section class="status-strip" id="statusStrip">Loading...</section>
    <section class="cards">
      <div class="card"><span>Today's Opportunities</span><strong id="totalOpps">0</strong></div>
      <div class="card"><span>High Priority</span><strong id="highOpps">0</strong></div>
      <div class="card"><span>Sources Healthy</span><strong id="healthySources">0</strong></div>
      <div class="card"><span>Last Update</span><strong id="lastUpdate">—</strong></div>
    </section>
    <section class="grid">
      <div class="panel wide">
        <div class="panel-head"><h2>Today's Top Opportunities</h2><span>Ranked by score and confidence</span></div>
        <div id="topOpportunities" class="list"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Source Health</h2></div>
        <div id="sourceHealth" class="source-list"></div>
      </div>
    </section>
    <section class="panel">
      <div class="panel-head"><h2>Opportunity Feed</h2><input id="search" placeholder="Search property, category, source..." /></div>
      <div id="feed" class="feed"></div>
    </section>
    <section class="panel muted">
      <div class="panel-head"><h2>Rejected Sample</h2><span>Useful for validating filters</span></div>
      <div id="rejected" class="feed"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
