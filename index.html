<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Property Intelligence</p>
        <h1>Today's Opportunities</h1>
      </div>
      <button id="refreshBtn">Update Intelligence</button>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Source Health</h2>
        <span id="lastUpdated">Not loaded</span>
      </div>
      <div id="sourceHealth" class="source-grid"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Opportunity Feed</h2>
        <span id="feedStatus"></span>
      </div>
      <div id="opportunities" class="cards"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
