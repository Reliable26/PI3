<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="status" id="lastUpdated">Last update: waiting</div>
      <div class="actions">
        <button id="refreshBtn">Update Intelligence</button>
      </div>
    </section>

    <section class="metrics">
      <article><span>Opportunities</span><strong id="metricOpps">0</strong></article>
      <article><span>High Priority</span><strong id="metricHigh">0</strong></article>
      <article><span>Source Health</span><strong id="metricHealth">0/0</strong></article>
      <article><span>Avg Confidence</span><strong id="metricConfidence">0%</strong></article>
    </section>

    <section class="grid">
      <section class="panel span-2">
        <div class="panel-head">
          <h2>Today's Top Opportunities</h2>
          <span id="routeStatus">Ranked by score</span>
        </div>
        <div id="topOpportunities" class="cards empty">No opportunities loaded yet.</div>
      </section>

      <section class="panel">
        <div class="panel-head"><h2>Source Health</h2></div>
        <div id="sourceHealth" class="health empty">No connector results loaded.</div>
      </section>

      <section class="panel span-3">
        <div class="panel-head"><h2>Opportunity Feed</h2></div>
        <div id="opportunityFeed" class="feed empty">No feed items loaded.</div>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
